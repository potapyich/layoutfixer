name: LayoutFixer
options:
  bundleIdPrefix: com.yourname
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  groupSortPosition: top
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: 5.10
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""

schemes:
  LayoutFixer:
    build:
      targets:
        LayoutFixer: all
        LayoutFixerTests: [test]
    test:
      targets:
        - LayoutFixerTests

targets:
  LayoutFixer:
    type: application
    platform: macOS
    bundleIdPrefix: com.yourname
    deploymentTarget: "14.0"
    info:
      path: LayoutFixer/Resources/Info.plist
      properties:
        CFBundleName: LayoutFixer
        CFBundleDisplayName: LayoutFixer
        CFBundleIdentifier: com.yourname.LayoutFixer
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundlePackageType: APPL
        NSPrincipalClass: NSApplication
        LSUIElement: true
        NSAccessibilityUsageDescription: "LayoutFixer needs Accessibility access to read and replace text in other applications."
        LSApplicationCategoryType: public.app-category.utilities
    entitlements:
      path: LayoutFixer/Resources/LayoutFixer.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourname.LayoutFixer
        INFOPLIST_FILE: LayoutFixer/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: LayoutFixer/Resources/LayoutFixer.entitlements
        ENABLE_APP_SANDBOX: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    sources:
      - path: LayoutFixer
        excludes:
          - "Resources/Info.plist"
          - "Resources/LayoutFixer.entitlements"

  LayoutFixerTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: LayoutFixerTests
      - path: LayoutFixer/Conversion
      - path: LayoutFixer/Hotkey/HotkeyDefinition.swift
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.yourname.LayoutFixerTests
        PRODUCT_NAME: LayoutFixerTests
        PRODUCT_MODULE_NAME: LayoutFixerTests
        SWIFT_VERSION: "5.10"
